# ─────────────────────────────────────────────────────────
#  Kustomization — déploiement en un seul `kubectl apply -k k8s/`
# ─────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: meteo-liora

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment-api.yaml
  - service-api.yaml
  - hpa.yaml

commonLabels:
  project: rain-australia
  managed-by: kustomize
